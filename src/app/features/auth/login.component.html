<div class="login-container">
  <div class="login-card-wrapper">
    <mat-card class="login-card">
      <mat-card-header>
        <div class="logo-container">
          <mat-icon class="logo-icon">important_devices</mat-icon>
          <h1 class="logo-text">INMS<span class="accent">PRO</span></h1>
        </div>
        <mat-card-subtitle>Sign in to access your dashboard</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput formControlName="Email" type="email" placeholder="admin@example.com" autocomplete="email">
            <mat-icon matPrefix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('Email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="loginForm.get('Email')?.hasError('email')">Please enter a valid email address</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput formControlName="Password" [type]="hidePassword ? 'password' : 'text'" autocomplete="current-password">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('Password')?.hasError('required')">Password is required</mat-error>
          </mat-form-field>

          <div class="form-actions">
          </div>

          <button mat-flat-button color="primary" class="login-btn full-width" type="submit" [disabled]="loginForm.invalid || isLoading">
            <mat-icon *ngIf="!isLoading">login</mat-icon>
            <span *ngIf="isLoading" class="spinner">↻</span>
            {{ isLoading ? 'Signing in...' : 'Sign In' }}
          </button>
        </form>
      </mat-card-content>
    </mat-card>
    <div class="background-decorations">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
    </div>
  </div>
</div>
